<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TubeCLI — Workflow Builder</title>
  <link rel="stylesheet" href="/static/workflow.css">
</head>
<body>

<div id="app">
  <!-- ── Toolbar ─────────────────────────────────────────── -->
  <div class="toolbar">
    <span class="toolbar-brand">⚡ Workflow Builder</span>
    <div class="toolbar-sep"></div>

    <button class="btn btn-default" onclick="WF.newWorkflow()" title="New">📄 New</button>
    <button class="btn btn-default" onclick="WF.saveWorkflow()" title="Save">💾 Save</button>
    <button class="btn btn-default" onclick="WF.loadWorkflow()" title="Load">📂 Load</button>

    <div class="toolbar-sep"></div>

    <button class="btn btn-primary" onclick="WF.importN8n()" title="Import n8n JSON">📥 n8n Import</button>
    <button class="btn btn-default" onclick="WF.exportN8n()" title="Export n8n JSON">📤 n8n Export</button>

    <div class="toolbar-spacer"></div>

    <button class="btn btn-default" onclick="WF.undo()">↩️ Undo</button>
    <span id="zoom-label" class="zoom-label" style="padding:0 8px">100%</span>
    <button class="btn btn-icon" onclick="WF.zoomIn()">➕</button>
    <button class="btn btn-icon" onclick="WF.zoomOut()">➖</button>
    <button class="btn btn-icon" onclick="WF.zoomFit()">🔲</button>
  </div>

  <!-- ── Main Area ───────────────────────────────────────── -->
  <div class="main-area">

    <!-- Left: Node Palette -->
    <div class="palette" id="palette">
      <div class="palette-header">📦 Nodes</div>
      <div class="palette-search">
        <input type="text" id="palette-search" placeholder="Search nodes..." oninput="WF.filterPalette(this.value)">
      </div>
      <div class="palette-list" id="palette-list">
        <!-- Dynamically populated -->
      </div>
    </div>

    <!-- Center: Canvas -->
    <div class="canvas-wrapper" id="canvas-wrapper">
      <div class="canvas" id="canvas">
        <div class="canvas-grid"></div>
        <svg class="connections-layer" id="connections-svg"></svg>
        <!-- Nodes rendered here -->
      </div>

      <!-- Floating controls -->
      <div class="run-controls">
        <button class="run-btn play" id="btn-run" onclick="WF.runWorkflow()" title="Run">▶</button>
        <button class="run-btn stop" id="btn-stop" onclick="WF.stopWorkflow()" title="Stop">⏹</button>
      </div>

      <div class="zoom-controls">
        <button class="btn btn-icon" onclick="WF.zoomOut()">−</button>
        <span id="zoom-label2" class="zoom-label">100%</span>
        <button class="btn btn-icon" onclick="WF.zoomIn()">+</button>
        <button class="btn btn-icon" onclick="WF.zoomFit()">⊡</button>
      </div>
    </div>

    <!-- Right: Property Panel -->
    <div class="property-panel" id="property-panel">
      <div class="panel-header">
        <span id="panel-title">⚙️ Properties</span>
      </div>
      <div class="panel-body" id="panel-body">
        <div class="panel-empty">
          <div class="panel-empty-icon">🖱️</div>
          <span>Click a node to edit</span>
        </div>
      </div>
    </div>

  </div>

  <!-- ── Log Panel ───────────────────────────────────────── -->
  <div class="log-panel" id="log-panel">
    <div class="log-header">
      <span>📋 Execution Log</span>
      <div class="toolbar-spacer"></div>
      <span class="log-status" id="log-status">⏸️ Ready</span>
      <button class="btn btn-icon" onclick="WF.clearLogs()" title="Clear Logs">🗑️</button>
    </div>
    <div class="log-body" id="log-body"></div>
  </div>
</div>

<!-- Context Menu -->
<div class="context-menu" id="context-menu">
  <div class="context-menu-item" onclick="WF.deleteSelected()">🗑️ Delete</div>
  <div class="context-menu-item" onclick="WF.duplicateSelected()">📋 Duplicate</div>
</div>

<!-- Hidden file inputs -->
<input type="file" id="file-load" accept=".json" style="display:none" onchange="WF.handleFileLoad(event)">
<input type="file" id="file-n8n" accept=".json" style="display:none" onchange="WF.handleN8nImport(event)">

<script src="/static/workflow-n8n.js"></script>
<script src="/static/workflow.js"></script>

</body>
</html>
